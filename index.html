<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle of Adwa - 2D WebGL Visualizer</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <h1>2D Interactive Visualization of the Battle of Adwa</h1>
      <p>Raw WebGL academic simulation demonstrating transformations, animation, and interaction.</p>
    </header>

    <main>
      <section class="canvas-wrap">
        <canvas id="battlefield" width="1100" height="680" aria-label="Battlefield simulation canvas"></canvas>
        <div class="minimap-wrap">
          <canvas id="minimap" width="240" height="160" aria-label="Mini-map"></canvas>
        </div>
      </section>

      <aside class="controls">
        <div class="button-row">
          <button id="startBtn">Start Battle</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>

        <div class="phase-row">
          <label for="phaseSelect">Battle Phase</label>
          <select id="phaseSelect">
            <option value="deployment">Deployment</option>
            <option value="movement">Movement</option>
            <option value="engagement">Engagement</option>
          </select>
        </div>

        <div class="slider-row">
          <label for="speedSlider">Simulation Speed: <span id="speedValue">1.0x</span></label>
          <input id="speedSlider" type="range" min="0.2" max="3" step="0.1" value="1" />
        </div>

        <div class="slider-row">
          <label for="timelineSlider">Timeline (Replay): <span id="timelineValue">0%</span></label>
          <input id="timelineSlider" type="range" min="0" max="100" step="1" value="0" />
        </div>

        <section class="info" id="unitInfo">
          <h2>Unit Info</h2>
          <p>Hover or click a unit to view details.</p>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
